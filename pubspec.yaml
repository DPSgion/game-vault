name: game_vault
description: "A new Flutter project for exploring games."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  
  # --- Firebase & Auth ---
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  google_sign_in: ^6.2.2
  cloud_firestore: ^6.4.0

  # --- State Management & UI ---
  provider: ^6.1.5+1
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1

  # --- Network & API ---
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  icons_launcher: ^2.1.7

flutter:
  uses-material-design: true
